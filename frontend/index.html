<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailIQ - AI Demand Forecasting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🛒 RetailIQ - AI Copilot for Retailers</span>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Upload Section -->
        <div class="card mb-4">
            <div class="card-header bg-success text-white">
                <h5>📤 Upload Sales Data</h5>
            </div>
            <div class="card-body">
                <input type="file" id="csvFile" class="form-control mb-3" accept=".csv">
                <button onclick="uploadCSV()" class="btn btn-success">Upload CSV</button>
                <div id="uploadResult" class="mt-3"></div>
            </div>
        </div>

        <!-- Forecast Section -->
        <div class="card mb-4">
            <div class="card-header bg-info text-white">
                <h5>📈 Demand Forecast</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <input type="text" id="productId" class="form-control mb-2" placeholder="Product ID (e.g., P001)">
                    </div>
                    <div class="col-md-4">
                        <select id="horizon" class="form-select mb-2">
                            <option value="7">7 Days</option>
                            <option value="14">14 Days</option>
                            <option value="30" selected>30 Days</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button onclick="getForecast()" class="btn btn-info w-100">Generate Forecast</button>
                    </div>
                </div>
                <div id="forecastResult" class="mt-3"></div>
                <canvas id="forecastChart" class="mt-3"></canvas>
            </div>
        </div>

        <!-- Inventory Recommendations Section -->
        <div class="card mb-4">
            <div class="card-header bg-warning text-dark">
                <h5>📦 Inventory Reorder Recommendations</h5>
            </div>
            <div class="card-body">
                <button onclick="getRecommendations()" class="btn btn-warning mb-3">Get Recommendations</button>
                <div id="recommendationsResult"></div>
            </div>
        </div>

        <!-- AI Copilot Section -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5>🤖 AI Copilot</h5>
            </div>
            <div class="card-body">
                <div id="chatHistory" class="chat-history mb-3"></div>
                <div class="input-group">
                    <input type="text" id="copilotQuery" class="form-control" placeholder="Ask me anything... (e.g., What should I restock?)">
                    <button onclick="askCopilot()" class="btn btn-primary">Ask</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
